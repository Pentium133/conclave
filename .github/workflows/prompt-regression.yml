# Prompt Regression Suite — manual workflow_dispatch ONLY.
#
# Runs the antisycophancy regression fixtures from tests/prompts/. NOT
# triggered on push/PR because each run consumes API tokens (paid).
#
# To run: GitHub UI → Actions → "Prompt Regression Suite" → Run workflow.
#
# Headless flow:
#   - Installs the `claude` CLI from npm (@anthropic-ai/claude-code).
#   - `tests/prompts/run-all.sh` auto-detects no-TTY in CI and switches to
#     headless mode. Driver invokes `claude -p "/<command>"
#     --dangerously-skip-permissions` for fixtures 02 and 03 (verified working
#     against claude-code >= 2.1.x). Fixture 01 (evasive-developer) is skipped
#     because /interview is multi-turn dialogue.
#   - Required secret: ANTHROPIC_API_KEY — set in repo Settings → Secrets and
#     variables → Actions.

name: Prompt Regression Suite

on:
  workflow_dispatch:
    inputs:
      no_cleanup:
        description: 'Keep process/<slug>/ artifacts after the run (for debugging)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  prompt-regression:
    name: Run prompt regression fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code
          which claude
          claude --version

      - name: Sanity — check artifacts and scripts
        run: |
          set -euo pipefail
          test -x tests/prompts/run-all.sh || chmod +x tests/prompts/run-all.sh
          test -x tests/prompts/01-evasive-developer/assert.sh || chmod +x tests/prompts/01-evasive-developer/assert.sh
          test -x tests/prompts/02-soft-spec/assert.sh         || chmod +x tests/prompts/02-soft-spec/assert.sh
          test -x tests/prompts/03-plausible-adrs/assert.sh    || chmod +x tests/prompts/03-plausible-adrs/assert.sh
          test -f docs/templates/STATE.template.md
          ls -la tests/prompts/

      - name: Run fixtures (headless auto-detected — no TTY in CI)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set."
            echo "::error::Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          FLAGS=()
          if [[ "${{ inputs.no_cleanup }}" == "true" ]]; then
            FLAGS+=(--no-cleanup)
          fi

          # CI has no TTY, so run-all.sh auto-selects headless mode.
          # Tee output so we can scrape per-fixture status for the job summary.
          set +e
          bash tests/prompts/run-all.sh "${FLAGS[@]}" 2>&1 | tee /tmp/suite.log
          STATUS=${PIPESTATUS[0]}
          set -e
          echo "SUITE_STATUS=$STATUS" >> "$GITHUB_ENV"
          exit $STATUS

      - name: Upload process artifacts (only on no_cleanup)
        if: ${{ always() && inputs.no_cleanup }}
        uses: actions/upload-artifact@v4
        with:
          name: process-${{ github.run_id }}
          path: process/
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Prompt Regression Suite"
            echo ""
            echo "**Result:** \`${SUITE_STATUS:-unknown}\` (0 = all passed, 1 = at least one fixture failed)"
            echo ""
            echo "### Per-fixture status"
            echo ""
            echo "| # | Fixture | Status |"
            echo "|---|---------|--------|"
            for fx in "01 evasive-developer" "02 soft-spec" "03 plausible-adrs"; do
              if   grep -qE "fixture $fx: PASS" /tmp/suite.log 2>/dev/null; then status="PASS"
              elif grep -qE "fixture $fx: FAIL" /tmp/suite.log 2>/dev/null; then status="FAIL"
              elif grep -qE "fixture $fx: SKIP" /tmp/suite.log 2>/dev/null; then status="SKIP"
              else status="?"
              fi
              echo "| ${fx%% *} | ${fx#* } | $status |"
            done
            echo ""
            echo "Fixture 01 is expected to be SKIP in CI: /interview is multi-turn dialogue and cannot be driven through \`claude -p\`. Run it locally with \`bash tests/prompts/run-all.sh --interactive\`."
            echo ""
            echo "See [tests/prompts/README.md](../tree/${{ github.sha }}/tests/prompts/README.md) for fixture details."
          } >> "$GITHUB_STEP_SUMMARY"
